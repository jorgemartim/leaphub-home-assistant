name: Build and publish Leap Hub Gateway

on:
  push:
    branches: [main]
    paths:
      - "leaphub_gateway/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jorgemartim/leaphub-gateway

jobs:
  build:
    name: Build, test and publish amd64 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read App version
        id: app
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version:[[:space:]]*"\([^"]*\)".*/\1/p' leaphub_gateway/config.yaml | head -n1)"
          test -n "${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify sources
        shell: bash
        run: |
          set -euo pipefail
          test -s leaphub_gateway/connector.py
          test -s leaphub_gateway/connector_server.py
          test -s leaphub_gateway/telemetry_engine.py
          test -s leaphub_gateway/privacy.py
          grep -q "import leaphub_connector as connector" leaphub_gateway/connector_server.py
          grep -q "leaphub_telemetry_engine" leaphub_gateway/connector_server.py
          python3 -m compileall -q leaphub_gateway

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./leaphub_gateway
          file: ./leaphub_gateway/Dockerfile
          platforms: linux/amd64
          push: true
          pull: true
          build-args: |
            BUILD_ARCH=amd64
            BUILD_VERSION=${{ steps.app.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.app.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}:${{ steps.app.outputs.version }}"
          for attempt in 1 2 3 4 5; do
            if docker buildx imagetools inspect "${image}" >/dev/null 2>&1; then
              echo "Manifesto publicado: ${image}"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "A imagem foi enviada, mas o manifesto da versão não ficou disponível: ${image}" >&2
          exit 1
