name: Build and publish Leap Hub Gateway

on:
  push:
    branches: [main]
    paths:
      - "leaphub_gateway/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: leaphub-gateway

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read App version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^version:[[:space:]]*["'"']\?\([^"'"']*\)["'"']\?$/\1/p' leaphub_gateway/config.yaml | head -n1)"
          if [[ -z "${version}" ]]; then
            echo "Não foi possível ler a versão de leaphub_gateway/config.yaml" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Prepare architecture matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: init
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build, sign and publish image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: ./leaphub_gateway
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          labels: |
            io.hass.type=app
            io.hass.name=Leap Hub Gateway
            io.hass.description=Gateway unificado Leapmotor, OCPP e Cloudflare para o Leap Hub
            io.hass.url=https://github.com/jorgemartim/leaphub-home-assistant
            org.opencontainers.image.title=Leap Hub Gateway
            org.opencontainers.image.description=Gateway unificado Leapmotor, OCPP e Cloudflare para Home Assistant
            org.opencontainers.image.licenses=LicenseRef-Proprietary
          push: "true"
          version: ${{ needs.init.outputs.version }}

  manifest:
    name: Publish multi-architecture manifest
    needs: [init, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish and sign manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
