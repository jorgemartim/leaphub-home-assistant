name: Build and publish Leap Hub Gateway

on:
  push:
    branches: [main]
    paths:
      - "leaphub_gateway/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jorgemartim/leaphub-gateway

jobs:
  build:
    name: Build and publish amd64 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Read App version
        id: app
        shell: bash
        run: |
          version="$(sed -n 's/^version:[[:space:]]*"\([^"]*\)".*/\1/p' leaphub_gateway/config.yaml | head -n1)"
          if [ -z "${version}" ]; then
            echo "Não foi possível ler a versão do App." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify Connector sources
        shell: bash
        run: |
          set -euo pipefail
          test -s leaphub_gateway/connector.py
          test -s leaphub_gateway/connector_server.py
          grep -q "import leaphub_connector as connector" leaphub_gateway/connector_server.py
          grep -q "COPY connector.py /app/connector.py" leaphub_gateway/Dockerfile
          sha256sum leaphub_gateway/connector.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./leaphub_gateway
          file: ./leaphub_gateway/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.app.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            BUILD_ARCH=amd64
            BUILD_VERSION=${{ steps.app.outputs.version }}
          labels: |
            io.hass.version=${{ steps.app.outputs.version }}
            io.hass.type=app
            io.hass.arch=amd64
            io.hass.name=Leap Hub Gateway
            io.hass.description=Gateway unificado Leapmotor, OCPP e Cloudflare para o Leap Hub
            io.hass.url=https://github.com/jorgemartim/leaphub-home-assistant
            org.opencontainers.image.title=Leap Hub Gateway
            org.opencontainers.image.description=Gateway unificado Leapmotor, OCPP e Cloudflare para Home Assistant
            org.opencontainers.image.source=https://github.com/jorgemartim/leaphub-home-assistant
            org.opencontainers.image.version=${{ steps.app.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
