name: Build and publish Leap Hub Gateway

on:
  push:
    branches: [main]
    paths:
      - "leaphub_gateway/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jorgemartim/leaphub-gateway

jobs:
  build:
    name: Build and publish amd64 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Read App version
        id: app
        shell: bash
        run: |
          version="$(sed -n 's/^version:[[:space:]]*"\([^"]*\)".*/\1/p' leaphub_gateway/config.yaml | head -n1)"
          if [ -z "${version}" ]; then
            echo "Não foi possível ler a versão do App." >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify Connector sources
        shell: bash
        run: |
          set -euo pipefail
          test -s leaphub_gateway/connector.py
          test -s leaphub_gateway/connector_server.py
          test -s leaphub_gateway/telemetry_engine.py
          grep -q "import leaphub_connector as connector" leaphub_gateway/connector_server.py
          grep -q "leaphub_telemetry_engine" leaphub_gateway/connector_server.py
          grep -q "COPY connector.py telemetry_engine.py /app/" leaphub_gateway/Dockerfile
          sha256sum leaphub_gateway/connector.py leaphub_gateway/telemetry_engine.py

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}:${{ steps.app.outputs.version }}"
          docker build \
            --pull \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_VERSION="${{ steps.app.outputs.version }}" \
            --tag "${image}" \
            ./leaphub_gateway

      - name: Smoke-test exact runtime image
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}:${{ steps.app.outputs.version }}"
          docker run --rm --entrypoint python3 "${image}" -c \
            "import leaphub_connector, leaphub_telemetry_engine; from leaphub_telemetry_engine import TelemetryEngine; import connector_server; print('runtime imports ok')"
          docker run --rm --entrypoint sh "${image}" -c \
            "test -s /app/telemetry_engine.py && test -s /usr/local/lib/python3.12/site-packages/leaphub_telemetry_engine.py"

      - name: Publish image
        shell: bash
        run: |
          set -euo pipefail
          versioned="${REGISTRY}/${IMAGE_NAME}:${{ steps.app.outputs.version }}"
          latest="${REGISTRY}/${IMAGE_NAME}:latest"
          docker push "${versioned}"
          docker tag "${versioned}" "${latest}"
          docker push "${latest}"
