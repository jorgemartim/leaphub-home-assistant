name: Build and publish Leap Hub Gateway

on:
  push:
    branches: [main]
    paths:
      - "leaphub_gateway/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jorgemartim/leaphub-gateway

jobs:
  build:
    name: Build, test and publish amd64 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Read App version
        id: app
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version:[[:space:]]*"\([^"]*\)".*/\1/p' leaphub_gateway/config.yaml | head -n1)"
          test -n "${version}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify repository
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml --requirement leaphub_gateway/requirements.txt
          python3 .github/scripts/validate_repository.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cached image locally
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}:${{ steps.app.outputs.version }}"
          docker buildx build \
            --pull \
            --load \
            --platform linux/amd64 \
            --cache-from type=gha,scope=leaphub-gateway-amd64 \
            --cache-to type=gha,mode=max,scope=leaphub-gateway-amd64 \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_VERSION="${{ steps.app.outputs.version }}" \
            --tag "${image}" \
            ./leaphub_gateway

      - name: Smoke-test exact runtime image
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}:${{ steps.app.outputs.version }}"
          docker run --rm --entrypoint python3 "${image}" -c \
            "import leaphub_connector, leaphub_telemetry_engine; from leaphub_telemetry_engine import TelemetryEngine; import connector_server, ocpp_gateway, gateway_manager; print('runtime imports ok')"
          docker run --rm --entrypoint sh "${image}" -c \
            "test -s /app/telemetry_engine.py && test -s /usr/local/lib/python3.12/site-packages/leaphub_telemetry_engine.py && ! test -e /usr/local/bin/cloudflared"

      - name: Publish version and latest tags
        shell: bash
        run: |
          set -euo pipefail
          versioned="${REGISTRY}/${IMAGE_NAME}:${{ steps.app.outputs.version }}"
          latest="${REGISTRY}/${IMAGE_NAME}:latest"
          docker push "${versioned}"
          docker tag "${versioned}" "${latest}"
          docker push "${latest}"

      - name: Verify published manifest
        shell: bash
        run: |
          set -euo pipefail
          image="${REGISTRY}/${IMAGE_NAME}:${{ steps.app.outputs.version }}"
          for attempt in $(seq 1 12); do
            if docker buildx imagetools inspect "${image}" | grep -q "linux/amd64"; then
              echo "Manifesto publicado e arquitetura amd64 confirmada."
              exit 0
            fi
            echo "Manifesto ainda não disponível; tentativa ${attempt}/12."
            sleep 10
          done
          echo "A tag foi enviada, mas o manifesto não ficou disponível no GHCR." >&2
          exit 1
