name: Validate repository

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "repository.yaml"
      - "leaphub_gateway/**"
      - ".github/scripts/**"
      - ".github/workflows/validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate repository and Python files
        run: python .github/scripts/validate_repository.py
