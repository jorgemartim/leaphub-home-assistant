configuration:
  connector_enabled:
    name: Ativar Connector Leapmotor
    description: Recebe solicitações assinadas do Leap Hub para consultar conta e veículos.
  staging_secret:
    name: Chave do Connector Beta
    description: Chave HMAC criada no ambiente Beta.
  production_secret:
    name: Chave do Connector Produção
    description: Chave HMAC criada na Produção. Use uma chave diferente da Beta.
  connector_max_parallel:
    name: Consultas simultâneas do Connector
    description: Limite de operações simultâneas contra a nuvem Leapmotor.
  connector_manual_wait_seconds:
    name: Espera de operações manuais
    description: Segundos que uma ação manual pode aguardar vaga antes de retornar ocupado.
  telemetry_beta_enabled:
    name: Ativar telemetria contínua Beta
    description: Coleta dados adaptativamente e entrega ao ambiente Beta.
  telemetry_beta_internal_url:
    name: Endpoint interno de telemetria Beta
    description: URL HTTPS que recebe a fila persistente no Leap Hub Beta.
  telemetry_production_enabled:
    name: Ativar telemetria contínua Produção
    description: Ative somente após configurar a chave e o site de Produção.
  telemetry_production_internal_url:
    name: Endpoint interno de telemetria Produção
    description: URL HTTPS que recebe a fila no Leap Hub de Produção.
  telemetry_active_seconds:
    name: Intervalo durante viagem
    description: Consulta automática rápida durante viagem. O padrão é 5 segundos e usa proteção com recuo em caso de limite ou falha.
  telemetry_charging_seconds:
    name: Intervalo durante recarga
    description: Consulta automática durante carregamento. O padrão é 5 segundos para detectar o início e acompanhar a curva.
  telemetry_parked_seconds:
    name: Intervalo estacionado
    description: Frequência automática quando estacionado. O padrão é 30 segundos para detectar cabo, recarga ou início de viagem.
  telemetry_sleep_seconds:
    name: Intervalo em repouso prolongado
    description: Frequência econômica após repouso prolongado. O padrão é 120 segundos.
  telemetry_rate_limit_cooldown_seconds:
    name: Pausa de proteção da nuvem Leapmotor
    description: Tempo de espera automático quando o Gateway detectar limitação de requisições. O padrão é 30 minutos.
  telemetry_batch_size:
    name: Eventos por envio
    description: Quantidade máxima de leituras enviadas ao site em cada lote.
  telemetry_retention_days:
    name: Retenção local após confirmação
    description: Dias que eventos já entregues permanecem no Home Assistant.
  telemetry_queue_max_events:
    name: Limite da fila local
    description: Proteção de armazenamento para a fila persistente.
  ocpp_beta_enabled:
    name: Ativar OCPP Beta
    description: Inicia o gateway OCPP Beta na porta 8092.
  ocpp_beta_internal_url:
    name: URL interna OCPP Beta
    description: Endpoint HTTPS do Leap Hub Beta.
  ocpp_beta_secret:
    name: Chave OCPP Beta
    description: Chave criada na página Servidor OCPP do Beta.
  ocpp_beta_max_connections:
    name: Limite de carregadores Beta
    description: Máximo de conexões OCPP simultâneas.
  ocpp_production_enabled:
    name: Ativar OCPP Produção
    description: Inicia o gateway OCPP Produção na porta 8093.
  ocpp_production_internal_url:
    name: URL interna OCPP Produção
    description: Endpoint HTTPS do Leap Hub Produção.
  ocpp_production_secret:
    name: Chave OCPP Produção
    description: Chave criada na página Servidor OCPP da Produção.
  ocpp_production_max_connections:
    name: Limite de carregadores Produção
    description: Máximo de conexões OCPP simultâneas.
  tunnel_enabled:
    name: Ativar Cloudflare Tunnel
    description: Ative somente depois de apontar as rotas para local-leaphub-gateway.
  tunnel_token:
    name: Token do Cloudflare Tunnel
    description: Token completo. Ele não aparece nos logs nem na linha de comando.
  tunnel_log_level:
    name: Nível de log do Tunnel
    description: Quantidade de detalhes do cloudflared.
  log_level:
    name: Nível de log dos serviços
    description: Quantidade de detalhes do Connector, OCPP e supervisor interno.
  dashboard_log_lines:
    name: Linhas de log no painel
    description: Quantidade máxima de linhas recentes exibidas por serviço.
network:
  8092/TCP: OCPP Beta para o Cloudflare Tunnel
  8093/TCP: OCPP Produção para o Cloudflare Tunnel
  8094/TCP: Connector Leapmotor para o Cloudflare Tunnel
  8099/TCP: Painel interno protegido pelo Ingress
