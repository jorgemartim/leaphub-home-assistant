name: "Leap Hub Gateway"
version: "1.12.08"
slug: "leaphub_gateway"
description: "Gateway unificado com sincronização automática adaptativa, fila persistente, Leapmotor, OCPP e Cloudflare Tunnel."
url: "https://github.com/jorgemartim/leaphub-home-assistant"
image: "ghcr.io/jorgemartim/leaphub-gateway"
arch:
  - amd64
startup: services
boot: auto
init: false
stage: experimental
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: "mdi:car-connected"
panel_title: "Leap Hub Gateway"
ports:
  8092/tcp: null
  8093/tcp: null
  8094/tcp: null
  8099/tcp: null
ports_description:
  8092/tcp: "OCPP Wallbox único (Beta e Produção)"
  8093/tcp: "Porta legada OCPP (não usada em novas instalações)"
  8094/tcp: "Connector Leapmotor (origem do Cloudflare Tunnel)"
  8099/tcp: "Painel interno Ingress"
watchdog: "http://[HOST]:[PORT:8099]/health"
options:
  connector_enabled: true
  staging_secret: ""
  production_secret: ""
  connector_max_parallel: 2
  connector_manual_wait_seconds: 35
  telemetry_beta_enabled: true
  telemetry_beta_internal_url: "https://leaphub.com.br/beta/leap/api/internal/telemetry/events"
  telemetry_production_enabled: false
  telemetry_production_internal_url: "https://leaphub.com.br/leap/api/internal/telemetry/events"
  telemetry_active_seconds: 30
  telemetry_interactive_seconds: 20
  telemetry_command_seconds: 12
  telemetry_command_max_polls: 3
  telemetry_charging_seconds: 30
  telemetry_parked_seconds: 300
  telemetry_sleep_seconds: 900
  telemetry_presence_window_seconds: 420
  telemetry_rate_limit_cooldown_seconds: 900
  telemetry_batch_size: 25
  telemetry_retention_days: 7
  telemetry_queue_max_events: 10000
  ocpp_beta_enabled: true
  ocpp_beta_internal_url: "https://leaphub.com.br/beta/leap/api/internal/ocpp"
  ocpp_beta_secret: ""
  ocpp_beta_max_connections: 100
  ocpp_production_enabled: false
  ocpp_production_internal_url: "https://leaphub.com.br/leap/api/internal/ocpp"
  ocpp_production_secret: ""
  ocpp_production_max_connections: 100
  tunnel_enabled: false
  tunnel_token: ""
  tunnel_log_level: "info"
  tunnel_protocol: "http2"
  log_level: "INFO"
  dashboard_log_lines: 80
schema:
  connector_enabled: bool
  staging_secret: "password?"
  production_secret: "password?"
  connector_max_parallel: "int(1,8)"
  connector_manual_wait_seconds: "int(2,60)"
  telemetry_beta_enabled: bool
  telemetry_beta_internal_url: url
  telemetry_production_enabled: bool
  telemetry_production_internal_url: url
  telemetry_active_seconds: "int(15,300)"
  telemetry_interactive_seconds: "int(15,60)"
  telemetry_command_seconds: "int(3,60)"
  telemetry_command_max_polls: "int(2,12)"
  telemetry_charging_seconds: "int(15,600)"
  telemetry_parked_seconds: "int(60,3600)"
  telemetry_sleep_seconds: "int(300,14400)"
  telemetry_presence_window_seconds: "int(300,1800)"
  telemetry_rate_limit_cooldown_seconds: "int(300,21600)"
  telemetry_batch_size: "int(1,50)"
  telemetry_retention_days: "int(1,60)"
  telemetry_queue_max_events: "int(100,100000)"
  ocpp_beta_enabled: bool
  ocpp_beta_internal_url: url
  ocpp_beta_secret: "password?"
  ocpp_beta_max_connections: "int(1,1000)"
  ocpp_production_enabled: bool
  ocpp_production_internal_url: url
  ocpp_production_secret: "password?"
  ocpp_production_max_connections: "int(1,1000)"
  tunnel_enabled: bool
  tunnel_token: "password?"
  tunnel_log_level: "list(debug|info|warn|error|fatal)"
  tunnel_protocol: "list(http2|auto|quic)"
  log_level: "list(DEBUG|INFO|WARNING|ERROR)"
  dashboard_log_lines: "int(20,300)"
